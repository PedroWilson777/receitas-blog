name: Publicar Receita Automática

on:
  schedule:
    # Roda a cada 30 minutos (UTC)
    - cron: "*/30 * * * *"
  workflow_dispatch: # permite rodar manualmente também

jobs:
  gerar-e-publicar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Gerar receita com Claude + imagem Pexels
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node scripts/gerar-receita.js

      - name: Commit e push da receita
        run: |
          git config user.name "ReceitasBot"
          git config user.email "bot@receitas.com"
          git add content/receitas/
          git diff --staged --quiet || git commit -m "feat: nova receita automática $(date '+%Y-%m-%d %H:%M')"
          git push

      # Posta a receita como pin no Pinterest com link para o blog.
      # continue-on-error: a receita já está publicada — falha no Pinterest não derruba o job.
      - name: Postar pin no Pinterest
        continue-on-error: true
        env:
          PINTEREST_APP_ID: ${{ secrets.PINTEREST_APP_ID }}
          PINTEREST_APP_SECRET: ${{ secrets.PINTEREST_APP_SECRET }}
          PINTEREST_REFRESH_TOKEN: ${{ secrets.PINTEREST_REFRESH_TOKEN }}
        run: node scripts/postar-pinterest.js
